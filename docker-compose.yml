version: '3.8'
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 12

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: sse_events
      MYSQL_USER: sseuser
      MYSQL_PASSWORD: ssepass
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-usseuser", "-pssepass"]
      interval: 5s
      timeout: 3s
      retries: 10

  sse-server:
    build: .
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: client-events
      KAFKA_GROUP_ID: sse-server
      MYSQL_URL: jdbc:mysql://mysql:3306/sse_events
      MYSQL_USER: sseuser
      MYSQL_PASSWORD: ssepass
      JWT_SECRET: change-me-in-production-use-a-real-secret

  subscribers:
    build: ./subscribers
    depends_on:
      - sse-server
    environment:
      SSE_URL: http://sse-server:8080/events
      JWT_SECRET: change-me-in-production-use-a-real-secret
      CLIENT_COUNT: "10"

volumes:
  mysql_data:
